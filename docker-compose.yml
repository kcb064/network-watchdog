# Network Watchdog — paste this straight into Dockge (Compose → new stack).
# No cloning, no config files: everything is set in the .env panel.
# Setting a service's variables turns its monitoring ON; blank = skipped.
# Docs: https://github.com/kcb064/network-watchdog
# Dashboard after deploy: http://<nas-ip>:8787

services:
  watchdog:
    image: ghcr.io/kcb064/network-watchdog:latest
    container_name: network-watchdog
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      TZ: ${TZ:-America/New_York}

      # -- ntfy push notifications (topic doubles as a password — make it long)
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_SERVER: ${NTFY_SERVER:-https://ntfy.sh}
      NTFY_TOKEN: ${NTFY_TOKEN:-}

      # -- URL your PHONE can reach; powers Approve/Deny buttons in alerts
      PUBLIC_URL: ${PUBLIC_URL:-}

      # -- UniFi (local admin account, not ui.com SSO)
      UNIFI_URL: ${UNIFI_URL:-}
      UNIFI_USERNAME: ${UNIFI_USERNAME:-}
      UNIFI_PASSWORD: ${UNIFI_PASSWORD:-}

      # -- Home Assistant (long-lived access token). HA_CONTAINER = its Docker
      #    container name on this NAS, enabling restart-HA remediation.
      HA_URL: ${HA_URL:-}
      HA_TOKEN: ${HA_TOKEN:-}
      HA_CONTAINER: ${HA_CONTAINER:-}

      # -- AdGuard Home (web UI credentials)
      ADGUARD_URL: ${ADGUARD_URL:-}
      ADGUARD_USERNAME: ${ADGUARD_USERNAME:-}
      ADGUARD_PASSWORD: ${ADGUARD_PASSWORD:-}

      # -- TrueNAS (UI → user icon → API Keys)
      TRUENAS_URL: ${TRUENAS_URL:-}
      TRUENAS_API_KEY: ${TRUENAS_API_KEY:-}

      # -- Optional
      WATCHDOG_PASSWORD: ${WATCHDOG_PASSWORD:-}      # dashboard basic auth (user "admin")
      HEARTBEAT_URL: ${HEARTBEAT_URL:-}              # healthchecks.io dead man's switch
      REMEDIATION_MODE: ${REMEDIATION_MODE:-tiered}  # tiered | approve_all | off

      # -- Connectivity self-healing (optional)
      # AdGuard runs as an HA add-on? Its slug lets the watchdog restart it:
      ADGUARD_HA_ADDON: ${ADGUARD_HA_ADDON:-}        # e.g. a0d7b954_adguard
      # If AdGuard stays dead after the restart attempts, switch UniFi DHCP
      # DNS to this resolver — and back again once AdGuard recovers:
      ADGUARD_FAILOVER_DNS: ${ADGUARD_FAILOVER_DNS:-}  # e.g. 1.1.1.1
      # HA smart plug powering the modem — power-cycled when internet is hard-down:
      WAN_POWER_CYCLE_ENTITY: ${WAN_POWER_CYCLE_ENTITY:-}  # e.g. switch.modem_plug
      # Per-action tier overrides (action=auto|approve|off, comma-separated):
      REMEDIATION_OVERRIDES: ${REMEDIATION_OVERRIDES:-}    # e.g. unifi.poe_cycle=auto

      # -- AI incident analysis (optional; needs a key from console.anthropic.com)
      # When set, incidents get a Claude-written root-cause diagnosis pushed
      # via ntfy and shown on the dashboard. Read-only: the AI never acts.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-opus-4-8}
    volumes:
      # Docker socket: container monitoring + restart remediation. Use ":ro"
      # and REMEDIATION_MODE=off for a strictly read-only watchdog.
      - /var/run/docker.sock:/var/run/docker.sock
      # History database; ./config also receives a config.example.yaml you can
      # copy to config/config.yaml for advanced tuning (env vars still win).
      - ./data:/data
      - ./config:/config
    cap_add:
      - NET_RAW   # ICMP ping

  # Optional: self-hosted ntfy so push works even when your WAN is down
  # (phone must be on LAN/VPN). Uncomment, set NTFY_SERVER=http://<nas-ip>:8780
  # in .env, and subscribe to your topic in the ntfy app.
  #
  # ntfy:
  #   image: binwiederhier/ntfy:latest
  #   container_name: ntfy
  #   restart: unless-stopped
  #   command: serve --cache-file /var/cache/ntfy/cache.db
  #   ports:
  #     - "8780:80"
  #   volumes:
  #     - ./ntfy-cache:/var/cache/ntfy
  #   environment:
  #     - TZ=${TZ:-America/New_York}
