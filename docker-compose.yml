# Network Watchdog — deploys from the prebuilt image on GHCR.
# Drop this folder (or just this file) into your Dockge stacks directory,
# e.g. /mnt/<pool>/dockge/stacks/network-watchdog, and deploy from Dockge.
#
# 1. Copy .env.example to .env and fill in your credentials.
# 2. Copy config.example.yaml to config/config.yaml and enable your services
#    (the container seeds config/config.yaml from the example on first start).
# 3. Deploy. Dashboard: http://<nas-ip>:8787
#
# Update later with: docker compose pull && docker compose up -d
# (or Dockge's Update button).

services:
  watchdog:
    image: ghcr.io/kcb064/network-watchdog:latest
    # To build from source instead of pulling the published image:
    # build: .
    container_name: network-watchdog
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      # Docker socket: required for container monitoring and restart remediation.
      # Make it ":ro" AND set remediation overrides to "off" if you want a
      # strictly read-only watchdog.
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/config
      - ./data:/data
    # ICMP ping needs NET_RAW (usually granted by default; explicit for clarity).
    cap_add:
      - NET_RAW

  # Optional: self-hosted ntfy so push notifications work even when your WAN is
  # down (phone must be on LAN/VPN). Uncomment, then set NTFY_SERVER in .env to
  # http://<nas-ip>:8780 and subscribe to your topic in the ntfy app.
  #
  # ntfy:
  #   image: binwiederhier/ntfy:latest
  #   container_name: ntfy
  #   restart: unless-stopped
  #   command: serve --cache-file /var/cache/ntfy/cache.db
  #   ports:
  #     - "8780:80"
  #   volumes:
  #     - ./ntfy-cache:/var/cache/ntfy
  #   environment:
  #     - TZ=${TZ:-America/New_York}
